<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CashierPro |Expense Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 20px 30px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .logo-area h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sync-status-card {
      background: #f8f9fa;
      padding: 10px 20px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .sync-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }

    .sync-dot.syncing {
      background: #ff9800;
      animation: pulse 0.5s infinite;
    }

    .sync-dot.offline {
      background: #dc3545;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 25px;
      padding: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .stat-header i {
      font-size: 2.5rem;
      opacity: 0.3;
    }

    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c757d;
      font-weight: 600;
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 800;
      color: #2c3e50;
      margin-top: 10px;
      word-break: break-word;
    }

    .main-card {
      background: white;
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #2c3e50;
      border-left: 4px solid #667eea;
      padding-left: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #495057;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input, select, textarea {
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 15px;
      font-size: 0.95rem;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      background: #f8f9fa;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: white;
      border: 2px solid #667eea;
      color: #667eea;
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      background: #667eea;
      color: white;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 20px;
      margin-top: 20px;
    }

    .expense-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    .expense-table th {
      background: #f8f9fa;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #495057;
      border-bottom: 2px solid #e9ecef;
    }

    .expense-table td {
      padding: 15px;
      border-bottom: 1px solid #e9ecef;
      vertical-align: middle;
    }

    .category-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #667eea;
    }

    .description-text {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: help;
      max-width: 200px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.75rem;
      text-align: center;
      min-width: 90px;
    }

    .status-Planned { background: #fff3cd; color: #856404; }
    .status-Paid { background: #d4edda; color: #155724; }
    .status-Cancelled { background: #f8d7da; color: #721c24; }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .action-btn-paid { background: #d4edda; color: #155724; }
    .action-btn-cancel { background: #f8d7da; color: #721c24; }
    .action-btn-planned { background: #fff3cd; color: #856404; }
    .action-btn-delete { background: #e2e3e5; color: #383d41; }

    .action-btn:hover {
      transform: scale(1.05);
    }

    .alert {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 20px;
      border-radius: 15px;
      background: white;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 350px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .alert-success { border-left: 4px solid #28a745; }
    .alert-error { border-left: 4px solid #dc3545; }
    .alert-info { border-left: 4px solid #17a2b8; }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: #6c757d;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .last-sync {
      font-size: 0.7rem;
      color: #6c757d;
      margin-left: 10px;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .stat-number { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div class="logo-area">
      <h1><i class="fas fa-cloud"></i> CashierPro</h1>
      <p style="font-size: 0.85rem; color: #6c757d; margin-top: 5px;">Cloud Sync · All Devices Share Same Data</p>
    </div>
    <div class="sync-status-card" id="syncStatusCard">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Connecting to cloud...</span>
      <i class="fab fa-google" style="color: #34a853;"></i>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-label">Total Expenses</span>
        <i class="fas fa-chart-line"></i>
      </div>
      <div class="stat-number" id="totalAmount">0 TZS</div>
    </div>
    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-label">Paid</span>
        <i class="fas fa-check-circle" style="color: #28a745;"></i>
      </div>
      <div class="stat-number" id="totalPaid">0 TZS</div>
    </div>
    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-label">Planned</span>
        <i class="fas fa-clock" style="color: #ffc107;"></i>
      </div>
      <div class="stat-number" id="totalPlanned">0 TZS</div>
    </div>
    <div class="stat-card">
      <div class="stat-header">
        <span class="stat-label">Cancelled</span>
        <i class="fas fa-ban" style="color: #dc3545;"></i>
      </div>
      <div class="stat-number" id="totalCancelled">0 TZS</div>
    </div>
  </div>

  <div class="main-card">
    <div class="section-title">
      <i class="fas fa-plus-circle" style="color: #667eea;"></i>
      <span>Record New Expense</span>
    </div>
    <div class="form-grid">
      <div class="input-group">
        <label><i class="fas fa-calendar-alt"></i> Payment Date</label>
        <input type="date" id="payDate" value="2026-03-27">
      </div>
      <div class="input-group">
        <label><i class="fas fa-folder"></i> Expense Category</label>
        <select id="expCategory">
          <option>Loading...</option>
        </select>
      </div>
      <div class="input-group">
        <label><i class="fas fa-pen"></i> Description</label>
        <input type="text" id="description" placeholder="What was this expense for?">
      </div>
      <div class="input-group">
        <label><i class="fas fa-money-bill-wave"></i> Amount (TZS)</label>
        <input type="number" id="amountTzs" placeholder="0">
      </div>
      <div class="input-group">
        <label><i class="fas fa-user"></i> Paid By</label>
        <input type="text" id="paidBy" placeholder="Who made the payment?">
      </div>
      <div class="input-group">
        <label><i class="fas fa-tag"></i> Status</label>
        <select id="statusSelect">
          <option value="Planned">📋 Planned</option>
          <option value="Paid">✅ Paid</option>
          <option value="Cancelled">❌ Cancelled</option>
        </select>
      </div>
      <div class="input-group">
        <label><i class="fas fa-receipt"></i> Receipt Reference</label>
        <input type="text" id="receiptRef" placeholder="Receipt # or notes">
      </div>
      <div class="input-group">
        <button id="addExpenseBtn" class="btn-primary">
          <i class="fas fa-cloud-upload-alt"></i> Save to Cloud
        </button>
      </div>
    </div>
  </div>

  <div class="main-card">
    <div class="section-title">
      <i class="fas fa-table"></i>
      <span>All Expenses (Shared Across All Devices)</span>
    </div>
    
    <div class="toolbar">
      <button id="refreshBtn" class="btn-secondary">
        <i class="fas fa-sync-alt"></i> Sync from Cloud
      </button>
      <span id="lastSyncTime" class="last-sync"></span>
    </div>

    <div class="table-container">
      <table class="expense-table">
        <thead>
          <tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Paid By</th><th>Status</th><th>Reference</th><th>Actions</th> </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty-state"><i class="fas fa-cloud-download-alt"></i><br>Loading data from cloud...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ============================================
  // IMPORTANT: REPLACE THIS WITH YOUR WEB APP URL
  // Get this from: Deploy → New deployment → Web app
  // ============================================
  const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWdN3rloPDqSx_xCnR90Gwa43yxoCnqu84-2fFOkthJZ64sIF993Z2pn6VcGdxlWg-/exec";
  // ============================================
  
  let expenses = [];
  let categories = [];
  let isLoading = false;
  let lastSync = null;

  // Update sync status display
  function updateSyncStatus(status, message) {
    const dot = document.getElementById('syncDot');
    const text = document.getElementById('syncText');
    
    dot.className = 'sync-dot';
    if (status === 'syncing') {
      dot.classList.add('syncing');
      text.innerHTML = message || 'Syncing...';
    } else if (status === 'online') {
      dot.classList.remove('syncing', 'offline');
      text.innerHTML = message || 'Connected to cloud';
    } else if (status === 'offline') {
      dot.classList.add('offline');
      text.innerHTML = message || 'Offline mode';
    }
  }

  // Call Google Apps Script
  async function callAppsScript(action, data = {}) {
    const params = new URLSearchParams({ action, ...data });
    const url = `${GOOGLE_APPS_SCRIPT_URL}?${params.toString()}&t=${Date.now()}`;
    
    try {
      const response = await fetch(url);
      const result = await response.json();
      return result;
    } catch (error) {
      console.error('Error calling Apps Script:', error);
      return null;
    }
  }

  // Fetch all expenses from cloud
  async function fetchExpensesFromCloud() {
    if (isLoading) return;
    isLoading = true;
    updateSyncStatus('syncing', 'Loading from cloud...');
    
    try {
      const result = await callAppsScript('getExpenses');
      if (result && result.success) {
        expenses = result.data;
        // Sort by date (newest first)
        expenses.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        renderTable();
        updateStats();
        updateSyncStatus('online', 'Cloud connected');
        lastSync = new Date();
        document.getElementById('lastSyncTime').innerHTML = `Last sync: ${lastSync.toLocaleTimeString()}`;
      } else {
        throw new Error('Failed to fetch');
      }
    } catch (error) {
      console.error('Error fetching expenses:', error);
      updateSyncStatus('offline', 'Cannot connect to cloud');
      // Load from local cache if available
      const cached = localStorage.getItem('cached_expenses');
      if (cached) {
        expenses = JSON.parse(cached);
        renderTable();
        updateStats();
      }
    } finally {
      isLoading = false;
    }
  }

  // Fetch categories from cloud
  async function fetchCategoriesFromCloud() {
    try {
      const result = await callAppsScript('getCategories');
      if (result && result.success && result.data.length > 0) {
        categories = result.data;
      } else {
        categories = ['Pharmacy Council Inspection', 'Computer & POS', 'Construction', 'Staff Salary', 'Utilities'];
      }
      updateCategoryDropdown();
    } catch (error) {
      categories = ['Pharmacy Council Inspection', 'Computer & POS', 'Construction', 'Staff Salary', 'Utilities'];
      updateCategoryDropdown();
    }
  }

  // Add expense to cloud
  async function addExpenseToCloud(expense) {
    updateSyncStatus('syncing', 'Saving to cloud...');
    
    try {
      const result = await callAppsScript('addExpense', {
        id: expense.id,
        date: expense.date,
        category: expense.category,
        description: expense.description,
        amount: expense.amount,
        paidBy: expense.paidBy,
        status: expense.status,
        receiptRef: expense.receiptRef
      });
      
      if (result && result.success) {
        updateSyncStatus('online', 'Cloud connected');
        return true;
      } else {
        throw new Error('Failed to save');
      }
    } catch (error) {
      updateSyncStatus('offline', 'Save failed - will retry');
      return false;
    }
  }

  // Update status in cloud
  async function updateStatusInCloud(expenseId, newStatus) {
    try {
      const result = await callAppsScript('updateStatus', {
        id: expenseId,
        status: newStatus
      });
      return result && result.success;
    } catch (error) {
      return false;
    }
  }

  // Delete expense from cloud
  async function deleteExpenseFromCloud(expenseId) {
    try {
      const result = await callAppsScript('deleteExpense', {
        id: expenseId
      });
      return result && result.success;
    } catch (error) {
      return false;
    }
  }

  function updateCategoryDropdown() {
    const select = document.getElementById('expCategory');
    select.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  }

  async function addExpense() {
    const newExpense = {
      id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
      date: document.getElementById('payDate').value,
      category: document.getElementById('expCategory').value,
      description: document.getElementById('description').value,
      amount: parseFloat(document.getElementById('amountTzs').value) || 0,
      paidBy: document.getElementById('paidBy').value,
      status: document.getElementById('statusSelect').value,
      receiptRef: document.getElementById('receiptRef').value
    };
    
    if (!newExpense.category || !newExpense.description) {
      showAlert('Please fill Category and Description', 'error');
      return;
    }
    
    // Disable button while saving
    const btn = document.getElementById('addExpenseBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    
    const saved = await addExpenseToCloud(newExpense);
    
    if (saved) {
      expenses.unshift(newExpense);
      renderTable();
      updateStats();
      showAlert('✅ Expense saved to cloud! All devices can see it.', 'success');
      
      // Clear form
      document.getElementById('description').value = '';
      document.getElementById('amountTzs').value = '';
      document.getElementById('receiptRef').value = '';
      document.getElementById('paidBy').value = '';
    } else {
      showAlert('❌ Failed to save. Check your internet connection.', 'error');
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Save to Cloud';
  }

  async function changeStatus(expenseId, newStatus) {
    const expense = expenses.find(e => e.id === expenseId);
    if (expense) {
      const oldStatus = expense.status;
      expense.status = newStatus;
      renderTable();
      updateStats();
      
      const updated = await updateStatusInCloud(expenseId, newStatus);
      if (updated) {
        showAlert(`✅ Status changed to ${newStatus}`, 'success');
      } else {
        expense.status = oldStatus; // Revert on failure
        renderTable();
        updateStats();
        showAlert(`❌ Failed to update status. Check connection.`, 'error');
      }
    }
  }

  async function deleteExpense(expenseId) {
    if (confirm('Delete this expense? This will remove it for ALL devices.')) {
      const expense = expenses.find(e => e.id === expenseId);
      if (expense) {
        const deleted = await deleteExpenseFromCloud(expenseId);
        if (deleted) {
          expenses = expenses.filter(e => e.id !== expenseId);
          renderTable();
          updateStats();
          showAlert('✅ Expense deleted from cloud', 'success');
        } else {
          showAlert('❌ Failed to delete. Check connection.', 'error');
        }
      }
    }
  }

  function truncateText(text, maxLength) {
    if (!text) return '—';
    return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (expenses.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i><br>No expenses yet. Add your first expense above!</td></tr>';
      return;
    }
    
    tbody.innerHTML = expenses.map(exp => `
      <tr>
        <td>${exp.date || '—'}</td>
        <td><span class="category-badge" title="${escapeHtml(exp.category)}">${escapeHtml(truncateText(exp.category, 25))}</span></td>
        <td><span class="description-text" title="${escapeHtml(exp.description)}">${escapeHtml(truncateText(exp.description, 30))}</span></td>
        <td style="font-weight: 700;">${(exp.amount || 0).toLocaleString()} TZS</td>
        <td>${exp.paidBy || '—'}</td>
        <td><span class="status-badge status-${exp.status}">${exp.status}</span></td>
        <td><small>${exp.receiptRef || '—'}</small></td>
        <td class="action-buttons">
          ${getActionButtons(exp)}
        </td>
      </tr>
    `).join('');
    
    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        const newStatus = btn.getAttribute('data-newstatus');
        const action = btn.getAttribute('data-action');
        if (action === 'delete') deleteExpense(id);
        else if (newStatus) changeStatus(id, newStatus);
      });
    });
  }

  function getActionButtons(exp) {
    if (exp.status === 'Planned') {
      return `
        <button class="action-btn action-btn-paid" data-id="${exp.id}" data-newstatus="Paid"><i class="fas fa-check"></i> Paid</button>
        <button class="action-btn action-btn-cancel" data-id="${exp.id}" data-newstatus="Cancelled"><i class="fas fa-times"></i> Cancel</button>
        <button class="action-btn action-btn-delete" data-id="${exp.id}" data-action="delete"><i class="fas fa-trash"></i></button>
      `;
    } else if (exp.status === 'Paid') {
      return `
        <button class="action-btn action-btn-cancel" data-id="${exp.id}" data-newstatus="Cancelled"><i class="fas fa-ban"></i> Cancel</button>
        <button class="action-btn action-btn-planned" data-id="${exp.id}" data-newstatus="Planned"><i class="fas fa-clock"></i> Planned</button>
        <button class="action-btn action-btn-delete" data-id="${exp.id}" data-action="delete"><i class="fas fa-trash"></i></button>
      `;
    } else {
      return `
        <button class="action-btn action-btn-paid" data-id="${exp.id}" data-newstatus="Paid"><i class="fas fa-check"></i> Paid</button>
        <button class="action-btn action-btn-planned" data-id="${exp.id}" data-newstatus="Planned"><i class="fas fa-clock"></i> Planned</button>
        <button class="action-btn action-btn-delete" data-id="${exp.id}" data-action="delete"><i class="fas fa-trash"></i></button>
      `;
    }
  }

  function updateStats() {
    let total = 0, paid = 0, planned = 0, cancelled = 0;
    expenses.forEach(exp => {
      const amt = exp.amount || 0;
      total += amt;
      if (exp.status === 'Paid') paid += amt;
      else if (exp.status === 'Planned') planned += amt;
      else if (exp.status === 'Cancelled') cancelled += amt;
    });
    
    document.getElementById('totalAmount').innerHTML = total.toLocaleString() + ' TZS';
    document.getElementById('totalPaid').innerHTML = paid.toLocaleString() + ' TZS';
    document.getElementById('totalPlanned').innerHTML = planned.toLocaleString() + ' TZS';
    document.getElementById('totalCancelled').innerHTML = cancelled.toLocaleString() + ' TZS';
  }

  function showAlert(message, type) {
    const alert = document.createElement('div');
    alert.className = `alert alert-${type}`;
    alert.innerHTML = `<span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span> ${message}`;
    document.body.appendChild(alert);
    setTimeout(() => alert.remove(), 4000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Event listeners
  document.getElementById('addExpenseBtn').addEventListener('click', addExpense);
  document.getElementById('refreshBtn').addEventListener('click', fetchExpensesFromCloud);
  
  // Initialize
  fetchCategoriesFromCloud();
  fetchExpensesFromCloud();
  
  // Auto-refresh every 30 seconds
  setInterval(() => {
    fetchExpensesFromCloud();
  }, 30000);
</script>
</body>
</html>
